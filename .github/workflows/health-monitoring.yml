name: health-monitoring

permissions:
  contents: read

on:
  workflow_dispatch:  # Manual only — weekly cron disabled 2026-05-01 (~300 min/month saved)

concurrency:
  group: health-monitoring
  cancel-in-progress: true

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Verify site structure
        run: |
          echo "Health check: $(date)"
          [ -f index.html ] && echo "index.html: OK" || echo "index.html: missing"
