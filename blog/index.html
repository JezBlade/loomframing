<!-- UTM handler (mirrors landing) -->
<script>
(function() {
  var params = new URLSearchParams(window.location.search);
  var utmKeys = ['utm_source', 'utm_medium', 'utm_campaign'];
  var captured = {};
  var hasUtm = false;

  utmKeys.forEach(function(key) {
    var val = params.get(key);
    if (val) {
      captured[key] = val;
      hasUtm = true;
      try { sessionStorage.setItem(key, val); } catch(e) {}
    } else {
      try { var stored = sessionStorage.getItem(key); if (stored) captured[key] = stored; } catch(e) {}
    }
  });

  if (hasUtm && typeof gtag === 'function') {
    gtag('event', 'utm_landing', {
      utm_source: captured.utm_source || '(none)',
      utm_medium: captured.utm_medium || '(none)',
      utm_campaign: captured.utm_campaign || '(none)'
    });
    var clean = new URLSearchParams(window.location.search);
    utmKeys.forEach(function(key) { clean.delete(key); });
    var newUrl = window.location.pathname + (clean.toString() ? '?' + clean.toString() : '') + window.location.hash;
    if (window.history && window.history.replaceState) {
      window.history.replaceState(null, '', newUrl);
    }
  }
})();
</script>
